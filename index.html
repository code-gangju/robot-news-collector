<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Trends — 로봇 산업·기술 동향</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111C;--bg-card:#0C1A28;--border:#162233;
  --accent:#2563EB;--accent-dim:rgba(37,99,235,.12);--sky:#38BDF8;
  --text:#C8DCF0;--muted:#4E7191;--dim:#1E3348;
  --sans:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;min-height:100vh}

/* HEADER */
header{position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);background:rgba(7,17,28,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.h-inner{max-width:1200px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.wordmark{display:flex;align-items:center;gap:11px}
.wm-icon{width:34px;height:34px;background:var(--accent-dim);border:1px solid rgba(37,99,235,.28);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.wm-text h1{font-size:14px;font-weight:700;letter-spacing:-.02em;color:#fff}
.wm-text p{font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:.02em;margin-top:1px}
.h-right{display:flex;align-items:center;gap:14px}
.live{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--sky)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--sky);animation:blink 2.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.h-date{font-family:var(--mono);font-size:10px;color:var(--muted)}

/* SIGNAL STRIP */
.signal{border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0A1929 0%,#071018 100%)}
.s-inner{max-width:1200px;margin:0 auto;padding:18px 24px;display:grid;grid-template-columns:72px 1fr;gap:20px;align-items:start}
@media(max-width:560px){.s-inner{grid-template-columns:1fr;gap:10px}}
.s-label{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);border-left:2px solid var(--accent);padding-left:9px;line-height:1.6;padding-top:2px}
.s-items{display:flex;flex-direction:column;gap:7px}
.s-item{display:flex;align-items:baseline;gap:9px;font-size:12.5px;color:var(--text);line-height:1.4}
.s-num{font-family:var(--mono);font-size:9px;color:var(--muted);flex-shrink:0;font-variant-numeric:tabular-nums;min-width:16px}
.s-foot{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-family:var(--mono);font-size:9px;color:var(--dim);display:flex;gap:12px}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:24px 24px 64px}
.g-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.g-label{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.g-count{font-family:var(--mono);font-size:9px;color:var(--dim);font-variant-numeric:tabular-nums}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);outline:1px solid var(--border)}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.grid{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--bg-card);display:flex;flex-direction:column;padding:18px 20px;text-decoration:none;color:inherit;position:relative;overflow:hidden;transition:background .14s;outline:none}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);transform:scaleY(0);transition:transform .18s ease;transform-origin:center}
.card:hover{background:#0F2038}
.card:hover::before{transform:scaleY(1)}
.card:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.c-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
.c-src{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
.c-time{font-family:var(--mono);font-size:9px;color:var(--dim);flex-shrink:0;font-variant-numeric:tabular-nums}
.c-title{font-size:13px;font-weight:600;line-height:1.45;color:#C8DCF0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px;text-wrap:balance}
.card:hover .c-title{color:#fff}
.c-summary{font-size:11.5px;color:var(--muted);line-height:1.56;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.c-foot{margin-top:13px;display:flex;justify-content:flex-end;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);transition:color .14s;border-top:1px solid var(--border);padding-top:11px}
.card:hover .c-foot{color:var(--accent)}

/* STATES */
.state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:72px 24px;background:var(--bg-card);color:var(--muted);font-family:var(--mono);font-size:10px}
.spinner{width:22px;height:22px;border:1.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(prefers-reduced-motion:reduce){
  .card,.card::before,.c-foot,.c-title,.live-dot{transition:none;animation:none}
  .spinner{animation:none;border-color:var(--accent)}
}
</style>
</head>
<body>

<header>
  <div class="h-inner">
    <div class="wordmark">
      <div class="wm-icon">🤖</div>
      <div class="wm-text">
        <h1>Robot Trends</h1>
        <p>로봇 산업 · 기술 동향</p>
      </div>
    </div>
    <div class="h-right">
      <div class="live"><span class="live-dot"></span>LIVE</div>
      <span class="h-date" id="hDate"></span>
    </div>
  </div>
</header>

<div class="signal">
  <div class="s-inner">
    <div class="s-label">오늘의<br>핵심</div>
    <div>
      <div class="s-items" id="sItems">
        <div class="s-item"><span class="s-num">—</span><span>불러오는 중...</span></div>
      </div>
      <div class="s-foot" id="sFoot"><span>— 건</span><span>·</span><span>로봇 산업, 로봇 기술</span></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="g-header">
    <span class="g-label">최신 뉴스</span>
    <span class="g-count" id="gCount">—</span>
  </div>
  <div class="grid" id="grid">
    <div class="state"><div class="spinner"></div><span>Loading...</span></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://rvtbpeeotpivmhkliuzd.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2dGJwZWVvdHBpdm1oa2xpdXpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNDU2NDMsImV4cCI6MjA5NzkyMTY0M30.BR2ajJ4kz6hrd_2eOlJXEIGiznrnZZIDh_oJy3w5K_U'

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

document.getElementById('hDate').textContent = new Date().toLocaleDateString('ko-KR', {
  year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short'
})

function ago(iso) {
  const d = Date.now() - new Date(iso).getTime()
  const h = Math.floor(d / 3600000), m = Math.floor(d / 60000)
  if (h >= 24) return Math.floor(h / 24) + 'd'
  if (h >= 1) return h + 'h'
  if (m >= 1) return m + 'm'
  return 'now'
}

function cardHtml(a) {
  const src = (a.media ?? '알 수 없음').replace('Google News', 'GN')
  return `<a class="card" href="${a.url}" target="_blank" rel="noopener noreferrer">
    <div class="c-meta">
      <span class="c-src">${src}</span>
      <span class="c-time">${ago(a.created_at)}</span>
    </div>
    <h2 class="c-title">${a.title}</h2>
    ${a.summary ? `<p class="c-summary">${a.summary}</p>` : ''}
    <div class="c-foot">원문 &rarr;</div>
  </a>`
}

async function load() {
  const today = new Date(); today.setHours(0, 0, 0, 0)

  let { data } = await db.from('news').select('*')
    .gte('created_at', today.toISOString())
    .order('created_at', { ascending: false }).limit(20)

  if (!data?.length) {
    const res = await db.from('news').select('*')
      .order('created_at', { ascending: false }).limit(20)
    data = res.data ?? []
  }

  document.getElementById('sItems').innerHTML = data.length
    ? data.slice(0, 3).map((a, i) =>
        `<div class="s-item"><span class="s-num">0${i + 1}</span><span>${a.summary ?? a.title}</span></div>`
      ).join('')
    : '<div class="s-item"><span class="s-num">—</span><span>뉴스 없음</span></div>'

  document.getElementById('sFoot').innerHTML =
    `<span>${data.length}건</span><span>·</span><span>로봇 산업, 로봇 기술</span><span>·</span><span>Google News RSS</span>`

  document.getElementById('gCount').textContent = data.length + '건'

  document.getElementById('grid').innerHTML = data.length
    ? data.map(cardHtml).join('')
    : '<div class="state"><span>수집된 뉴스가 없습니다</span></div>'
}

load()
</script>
</body>
</html>
